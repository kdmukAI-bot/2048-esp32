name: Build 2048 Firmware

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  resolve-image-owner:
    runs-on: ubuntu-24.04
    outputs:
      owner_lc: ${{ steps.owner.outputs.owner_lc }}
    steps:
      - name: Lowercase GHCR owner
        id: owner
        run: echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve-image-owner
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    env:
      IDF_PATH: /opt/toolchains/esp-idf
      IDF_TOOLS_PATH: /opt/espressif
    container:
      image: ghcr.io/${{ needs.resolve-image-owner.outputs.owner_lc }}/2048-esp32-base:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure baked ESP-IDF tools environment
        run: |
          test -d /opt/toolchains/esp-idf
          mkdir -p "$IDF_TOOLS_PATH"
          source "$IDF_PATH/export.sh"
          idf.py --version

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: /root/.cache/ccache
          key: ccache-esp32s3-${{ hashFiles('main/**', 'components/**') }}
          restore-keys: |
            ccache-esp32s3-

      - name: Build firmware
        run: |
          source "$IDF_PATH/export.sh"
          idf.py set-target esp32s3
          idf.py build -DCCACHE_ENABLE=1 2>&1 | tee build-log.txt

      - name: Record build provenance
        run: |
          {
            echo "timestamp_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "git_ref=${{ github.ref }}"
            echo "git_sha=${{ github.sha }}"
            echo "idf_head=$(git -C "$IDF_PATH" rev-parse HEAD)"
            echo "idf_version=$(source "$IDF_PATH/export.sh" >/dev/null 2>&1; idf.py --version 2>/dev/null || true)"
            echo "cmake=$(cmake --version | head -n1)"
          } | tee build/provenance.txt

      - name: Collect firmware artifacts
        run: |
          mkdir -p out/bootloader out/partition_table
          cp build/game_2048.bin out/ 2>/dev/null || cp build/*.bin out/ 2>/dev/null || true
          cp build/game_2048.elf out/ 2>/dev/null || cp build/*.elf out/ 2>/dev/null || true
          cp build/flash_args out/ 2>/dev/null || true
          cp build/bootloader/bootloader.bin out/bootloader/ 2>/dev/null || true
          cp build/partition_table/partition-table.bin out/partition_table/ 2>/dev/null || true
          cp build/provenance.txt out/ 2>/dev/null || true
          cp build-log.txt out/ 2>/dev/null || true

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-2048-esp32s3
          path: out/

  desktop-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev lv2-dev cmake pkg-config

      - name: Install LVGL from source
        run: |
          git clone --depth 1 --branch release/v8.3 https://github.com/lvgl/lvgl.git /tmp/lvgl
          cd /tmp/lvgl
          # Use our lv_conf.h
          cp ${{ github.workspace }}/desktop/lv_conf.h .
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local \
                   -DLV_CONF_PATH=/tmp/lvgl/lv_conf.h \
                   -DBUILD_SHARED_LIBS=OFF
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Build desktop simulator
        run: |
          cmake -S desktop -B desktop/build
          cmake --build desktop/build

      - name: Upload desktop binary
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: desktop/build/game_2048_desktop

  desktop-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install sdl2

      - name: Install LVGL from source
        run: |
          git clone --depth 1 --branch release/v8.3 https://github.com/lvgl/lvgl.git /tmp/lvgl
          cd /tmp/lvgl
          cp ${{ github.workspace }}/desktop/lv_conf.h .
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local \
                   -DLV_CONF_PATH=/tmp/lvgl/lv_conf.h \
                   -DBUILD_SHARED_LIBS=OFF
          make -j$(sysctl -n hw.ncpu)
          sudo make install

      - name: Build desktop simulator
        run: |
          cmake -S desktop -B desktop/build
          cmake --build desktop/build

      - name: Upload desktop binary
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: desktop/build/game_2048_desktop

  desktop-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SDL2
        shell: bash
        run: |
          curl -L -o sdl2.zip https://github.com/libsdl-org/SDL/releases/download/release-2.32.10/SDL2-devel-2.32.10-VC.zip
          unzip sdl2.zip -d /c/SDL2
          # VC package has include/SDL.h; restructure to include/SDL2/SDL.h
          # so #include <SDL2/SDL.h> works (matching Linux/macOS convention)
          cd /c/SDL2/SDL2-2.32.10
          mkdir -p include/SDL2
          mv include/*.h include/SDL2/
          echo "SDL2_DIR=C:/SDL2/SDL2-2.32.10/cmake" >> "$GITHUB_ENV"

      - name: Install LVGL from source
        shell: bash
        run: |
          git clone --depth 1 --branch release/v8.3 https://github.com/lvgl/lvgl.git /tmp/lvgl
          cd /tmp/lvgl
          cp "$GITHUB_WORKSPACE/desktop/lv_conf.h" .
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=C:/lvgl-install \
                   -DLV_CONF_PATH=C:/tmp/lvgl/lv_conf.h \
                   -DBUILD_SHARED_LIBS=OFF
          cmake --build . --config Release
          cmake --install . --config Release

      - name: Build desktop simulator
        shell: bash
        run: |
          cmake -S desktop -B desktop/build \
            -DCMAKE_PREFIX_PATH="C:/SDL2/SDL2-2.32.10;C:/lvgl-install"
          cmake --build desktop/build --config Release

      - name: Collect Windows binary
        shell: bash
        run: |
          cp C:/SDL2/SDL2-2.32.10/lib/x64/SDL2.dll desktop/build/Release/
          ls -la desktop/build/Release/

      - name: Upload desktop binary
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            desktop/build/Release/game_2048_desktop.exe
            desktop/build/Release/SDL2.dll
